    <style>
        body { background-color: #020617; color: white; font-family: 'system-ui', sans-serif; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-active { transform: scale(1.05); border-color: #f59e0b; box-shadow: 0 0 25px rgba(245, 158, 11, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        .win-badge {
            position: absolute; top: -5px; right: -5px;
            background: linear-gradient(45deg, #f59e0b, #b45309);
            color: white; font-size: 10px; font-weight: 900;
            width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 2px solid #0f172a; z-index: 10;
        }

        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 10px #f59e0b; } 50% { box-shadow: 0 0 20px #f59e0b; } }
        .active-double { animation: pulse-gold 1.5s infinite; border-color: #f59e0b !important; background: #b45309 !important; color: white !important; }
        
        .gold-glow { box-shadow: 0 0 20px #f59e0b; border: 3px solid #f59e0b; }
        .vanish { animation: vanish-anim 1.5s forwards; }
        @keyframes vanish-anim { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.5) translateY(-50px); filter: grayscale(1); } }
        
        .team-tag { font-size: 8px; padding: 1px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; display: inline-block; margin-top: 4px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Schermata Iniziale -->
    <div id="menu-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-4 text-center">
        <div class="max-w-md w-full glass p-10 rounded-[3rem] border-blue-500/20 shadow-2xl">
            <h1 class="text-5xl font-black italic mb-2 tracking-tighter">TORNEO <span class="text-blue-500 text-6xl">100</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-10">Team Random & Live Battle</p>
            <input id="nick-input" type="text" placeholder="IL TUO NICKNAME" maxlength="12" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 text-center font-bold mb-6 text-white outline-none focus:ring-2 ring-blue-500">
            <div class="space-y-4">
                <button id="btn-create" onclick="handleCreateRoom()" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase hover:bg-blue-500 transition-colors shadow-lg">Crea Stanza</button>
                <div class="flex gap-2">
                    <input id="join-code-input" type="text" placeholder="CODICE" maxlength="5" class="flex-1 p-4 rounded-2xl bg-slate-900 border border-slate-700 text-center font-bold uppercase">
                    <button id="btn-join" onclick="handleJoinRoom()" class="bg-slate-700 px-8 rounded-2xl font-black uppercase hover:bg-slate-600 transition-colors">ENTRA</button>
                </div>
            </div>
            <p id="auth-status" class="mt-6 text-[10px] text-slate-500 font-bold uppercase italic tracking-widest">Connessione al server...</p>
        </div>
    </div>

    <!-- Interfaccia Gioco -->
    <div id="game-screen" class="hidden flex-1 flex flex-col h-screen overflow-hidden">
        
        <!-- Header -->
        <div class="bg-slate-900/95 border-b border-white/10 p-2 space-y-2">

                <div class="glass px-3 py-1 rounded-lg border-blue-500/30">

                    <span id="display-room-code" class="font-black text-sm tracking-widest">---</span>

            </div>
        </div>

        <!-- Timer & Round Bar -->
        <div class="bg-slate-900 px-4 py-2 flex items-center justify-between border-b border-white/5">

            <div class="flex items-center gap-4 flex-1 justify-end">
                <div class="w-48 bg-slate-800 h-2 rounded-full overflow-hidden border border-white/10">
                    <div id="timer-bar" class="h-full bg-blue-500 w-full transition-all duration-100 linear"></div>
                </div>
            </div>
        </div>

        <!-- Main Arena -->
        <div class="flex-1 relative overflow-hidden flex flex-col items-center justify-center p-4">
            
            <!-- Estinzione Team Overlay -->
            <div id="team-extinction-overlay" class="hidden absolute inset-0 z-50 bg-slate-950/95 flex flex-col items-center justify-center p-8 text-center">
                <h2 class="text-4xl font-black italic text-red-500 uppercase mb-8" id="extinction-msg"></h2>
                <div id="extinction-grid" class="grid grid-cols-5 gap-4 max-w-2xl"></div>
            </div>

            <!-- Sfida Speciale Overlay -->
            <div id="special-challenge-msg" class="hidden absolute top-10 z-40 bg-yellow-500 text-black px-10 py-2 font-black italic uppercase rounded-full shadow-2xl animate-bounce"></div>

            <div id="betting-screen" class="hidden w-full max-w-4xl text-center">
                <h2 class="text-3xl font-black italic uppercase mb-2">Scommetti sul Vincitore</h2>
                <div id="bet-options" class="grid grid-cols-2 md:grid-cols-5 gap-3"></div>
            </div>

            <div id="voting-arena" class="hidden w-full max-w-5xl">
                <h2 id="voting-title" class="text-center text-xl font-black italic uppercase mb-6 text-red-500">Chi vuoi eliminare? <span id="votes-counter" class="text-white ml-2"></span></h2>
                <div id="matchDisplay" class="flex flex-wrap justify-center gap-6"></div>
            </div>

            <div id="suspense-screen" class="hidden text-center">
                <div id="reveal-votes" class="flex justify-center gap-8 mb-8"></div>
                <h2 class="text-5xl font-black italic text-red-600 uppercase">Eliminato!</h2>
            </div>

            <div id="waiting-lobby" class="text-center">
                <h2 class="text-xl font-black text-slate-500 mb-6 italic uppercase">Sala d'Attesa</h2>
                <div id="lobby-list" class="flex flex-wrap justify-center gap-2 mb-8"></div>
                <div id="host-controls" class="hidden">
                    <button onclick="startBettingPhase()" class="bg-blue-600 px-10 py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-blue-500 transition-all transform hover:scale-105">AVVIA PARTITA</button>
                </div>
            </div>

            <!-- Schermata Vittoria Finale -->
            <div id="victory-screen" class="hidden text-center w-full max-w-6xl p-6">
                <div class="text-6xl mb-2 animate-bounce">🏆</div>
                <div class="text-xs font-black text-yellow-500 uppercase tracking-widest mb-1">TEAM VINCITORE</div>
                <h2 id="winTeamName" class="text-7xl font-black uppercase italic mb-10">---</h2>
                
                <div class="glass p-8 rounded-[3rem] border-yellow-500/30">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-6">Classifica Membri per Punti</p>
                    <div id="win-team-members" class="flex flex-wrap justify-center gap-4"></div>
                </div>

                <button onclick="location.reload()" class="mt-10 bg-blue-600 px-12 py-4 rounded-2xl font-black uppercase text-sm hover:bg-blue-500 transition-all shadow-xl">Torna al Menu</button>
            </div>
        </div>

        <!-- Footer -->
        <div id="teamsContainer" class="h-[200px] bg-slate-900/90 border-t border-white/5 p-3 flex gap-3 overflow-x-auto custom-scrollbar"></div>
    </div>

    <div id="toast" class="fixed bottom-32 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-2xl font-black text-xs hidden z-[200] border border-blue-500 shadow-2xl"></div>

            { n: "Elsa", i: "https://i.pinimg.com/736x/d8/19/10/d819101157f153a19e84aa5ee0a72b9f.jpg" },
            { n: "Rapunzel", i: "https://i.pinimg.com/736x/91/6e/d2/916ed20a1658e45f0039f582f02dc507.jpg" },
            { n: "Merlino", i: "https://i.pinimg.com/736x/c4/aa/fa/c4aafa2f0356da1003137bd12edfffac.jpg" },
            { n: "Ade", i: "https://i.pinimg.com/736x/e7/29/0c/e7290c161c9517ba4038274d1aa8a6cf.jpg" },
            { n: "Gommarosa", i: "https://i.pinimg.com/736x/27/3e/df/273edf0076e41b90096717b89e04c1aa.jpg" },
            { n: "Vanellope", i: "https://i.pinimg.com/736x/ad/5f/16/ad5f1687ee819a550fd789b6d7e356db.jpg" },
            { n: "Peach", i: "https://i.pinimg.com/736x/4e/fa/40/4efa401eafab814002a472cee6a847b5.jpg" },
            { n: "Zelda", i: "https://i.pinimg.com/736x/6e/cc/8c/6ecc8c13f456dd1b91023cd7475632c8.jpg" },
            { n: "Woody", i: "https://i.pinimg.com/736x/c6/cc/ca/c6ccca2d5a37919657b6eae0ccaba8fe.jpg" },
            { n: "Buzz", i: "https://i.pinimg.com/736x/30/c9/e0/30c9e0a90ae1e73676b7b210b74ae7a1.jpg" },
            { n: "Jessie TS", i: "https://i.pinimg.com/736x/54/f1/0b/54f10bf2096e5872f94334fcddefbcb1.jpg" },
            { n: "Bullseye", i: "https://i.pinimg.com/736x/b8/b5/4c/b8b54c5ccec106b962ccc598ea83d530.jpg" },
            { n: "Fred", i: "https://i.pinimg.com/1200x/78/bf/42/78bf42e10ff3abd7c9dc6bffd684af84.jpg" },
            { n: "Daphne", i: "https://i.pinimg.com/736x/8e/13/57/8e13578db1208f86f7b8059647d82cdb.jpg" },
            { n: "Velma", i: "https://i.pinimg.com/736x/2e/1e/95/2e1e953bb0b8a89d1574c0b221cd39b1.jpg" },
            { n: "Shaggy", i: "https://i.pinimg.com/736x/73/18/0e/73180e9d1b68bee40fa289746f8c06de.jpg" }
        ];

        const teamNames = ["Titani", "Abisso", "Foresta", "Fulmine", "Nebula", "Inferno", "Glaciali", "Sabbia", "Corazza", "Spiriti"];
        const teamColors = ["#ef4444", "#3b82f6", "#22c55e", "#eab308", "#a855f7", "#ec4899", "#06b6d4", "#f97316", "#14b8a6", "#8b5cf6"];

        let currentUser = null, nick = "", roomCode = "", isHost = false, roomData = null, timerInt = null;
        let myBetTeamId = null, myPower = 0, myDoubleVotes = 0, isDoubleActive = false, localVoted = false;

        const getRoomDoc = (code) => doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);

        // --- FIX: Gestione Autenticazione Robusta ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenErr) {
                        console.error("Token mismatch, fallback anonimo");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
            }
        };

        onAuthStateChanged(auth, u => { 
            if(u) { 
                currentUser = u; 
                document.getElementById('auth-status').innerText = "Online"; 
            } else {
                initAuth();
            }
        });
        initAuth();

        window.handleCreateRoom = async () => {
            if(!currentUser) return;
            nick = document.getElementById('nick-input').value.trim();
            if(!nick) return showToast("Inserisci nickname!");
            roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
            isHost = true;
            
            const shuffledPool = [...rawPool].sort(() => Math.random() - 0.5);
            const fighters = shuffledPool.map((c, i) => ({ id: i, n: c.n, i: c.i, dead: false, wins: 0, teamId: Math.floor(i/10) }));
            const teams = teamNames.map((n, i) => ({ id: i, name: n, color: teamColors[i] }));
            
            await setDoc(getRoomDoc(roomCode), { 
                host: currentUser.uid, status: 'waiting', players: [{ uid: currentUser.uid, nick }], 
                teams, allFighters: fighters, round: 1, timerEnd: 0, arena: [], votes: {}, bets: {} 
            });
            enterGame();
        };

        window.handleJoinRoom = async () => {
            const code = document.getElementById('join-code-input').value.trim().toUpperCase();
            nick = document.getElementById('nick-input').value.trim();
            if(!nick || !code) return;
            const snap = await getDoc(getRoomDoc(code));
            if(!snap.exists()) return showToast("Stanza non trovata!");
            roomCode = code;
            await updateDoc(getRoomDoc(code), { players: arrayUnion({ uid: currentUser.uid, nick }) });
            enterGame();
        };

        function enterGame() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-room-code').innerText = roomCode;
            onSnapshot(getRoomDoc(roomCode), snap => { 
                if(snap.exists()) { 
                    const oldData = roomData;
                    roomData = snap.data(); 
                    if(oldData) checkTeamExtinction(oldData, roomData);
                    updateUI(); 
                    
                    // --- LOGICA ACCELERAZIONE TIMER ---
                    if (isHost && roomData.status === 'voting') {
                        const totalPlayers = roomData.players.length;
                        const totalVotes = Object.keys(roomData.votes || {}).length;
                        // Se tutti hanno votato e il timer non è ancora scaduto, forziamo la fine
                        if (totalVotes >= totalPlayers && roomData.timerEnd > Date.now() + 500) {
                            updateDoc(getRoomDoc(roomCode), { timerEnd: Date.now() });
                        }
                    }
                } 
            });
        }

        async function checkTeamExtinction(old, current) {
            const oldAlives = old.allFighters.filter(f => !f.dead);
            const curAlives = current.allFighters.filter(f => !f.dead);
            
            for(let tid = 0; tid < 10; tid++) {
                const wasAlive = oldAlives.some(f => f.teamId === tid);
                const isNowDead = !curAlives.some(f => f.teamId === tid);
                
                if(wasAlive && isNowDead) {
                    const team = current.teams[tid];
                    const members = current.allFighters.filter(f => f.teamId === tid);
                    
                    const overlay = document.getElementById('team-extinction-overlay');
                    const grid = document.getElementById('extinction-grid');
                    document.getElementById('extinction-msg').innerText = `Il Team ${team.name} ha esaurito i membri!`;
                    document.getElementById('extinction-msg').style.color = team.color;
                    
                    grid.innerHTML = members.map(m => `
                        <div class="vanish">
                            <img src="${m.i}" class="w-20 h-20 rounded-xl object-cover border-2" style="border-color:${team.color}">
                            <p class="text-[8px] font-bold mt-1">${m.n}</p>
                        </div>
                    `).join('');
                    
                    overlay.classList.remove('hidden');
                    setTimeout(() => overlay.classList.add('hidden'), 4000);
                    break;
                }
            }
        }

        function updateUI() {
            const { status, round, teams, allFighters, arena, votes, timerEnd, players } = roomData;
            document.getElementById('round-display').innerText = `ROUND ${round}`;
            
            document.getElementById('waiting-lobby').classList.toggle('hidden', status !== 'waiting');
            document.getElementById('betting-screen').classList.toggle('hidden', status !== 'betting');
            document.getElementById('voting-arena').classList.toggle('hidden', status !== 'voting');
            document.getElementById('suspense-screen').classList.toggle('hidden', status !== 'suspense');
            document.getElementById('victory-screen').classList.toggle('hidden', status !== 'finished');

            if(isHost) document.getElementById('host-controls').classList.toggle('hidden', status !== 'waiting');
            
            if(status === 'waiting') {
                document.getElementById('lobby-list').innerHTML = players.map(p => `<span class="bg-blue-900/40 px-4 py-2 rounded-full font-bold text-xs border border-blue-500/30">${p.nick}</span>`).join('');
            }

            if(status === 'betting') { 
                if(myBetTeamId === null) renderBetOptions(teams); 
                startTimer(timerEnd, 30000); 
            }
            if(status === 'voting') { 
                const numVotes = Object.keys(votes || {}).length;
                document.getElementById('votes-counter').innerText = `(${numVotes}/${players.length})`;
                renderArena(arena, votes, allFighters, teams, round); 
                startTimer(timerEnd, 15000); 
            }
            if(status === 'suspense') { renderSuspense(arena, votes, allFighters); }
            if(status === 'finished') { renderFinalVictory(allFighters, teams); }

            renderTopStats(allFighters, teams);
            renderTeamsPanel(teams, allFighters, arena);
        }

        function renderBetOptions(teams) {
            document.getElementById('bet-options').innerHTML = teams.map(t => `
                <button onclick="submitBet(${t.id}, '${t.name}')" class="glass p-4 rounded-2xl border-b-4 hover:bg-slate-800 transition-all font-black uppercase text-xs" style="border-bottom-color:${t.color}">
                    <span style="color:${t.color}">${t.name}</span>
                </button>
            `).join('');
        }

        window.submitBet = async (tid, tname) => {
            myBetTeamId = tid;
            document.getElementById('bet-options').innerHTML = `<div class="col-span-full py-10"><p class="text-blue-500 text-xl font-black uppercase italic animate-pulse">Scommessa piazzata su ${tname}!</p></div>`;
            await updateDoc(getRoomDoc(roomCode), { [`bets.${currentUser.uid}`]: tid });
        };

        function startTimer(endTime, duration) {
            if(timerInt) clearInterval(timerInt);
            timerInt = setInterval(() => {
                const now = Date.now();
                const diff = endTime - now;
                const perc = Math.max(0, (diff / duration) * 100);
                document.getElementById('timer-bar').style.width = perc + '%';
                if(diff <= 0) { 
                    clearInterval(timerInt); 
                    if(isHost) { 
                        if(roomData?.status === 'betting') nextMatch(); 
                        else if(roomData?.status === 'voting') processRound(); 
                    } 
                }
            }, 100);
        }

        async function processRound() {
            if(!isHost || roomData.status !== 'voting') return;
            await updateDoc(getRoomDoc(roomCode), { status: 'suspense' });
            setTimeout(async () => {
                const snap = await getDoc(getRoomDoc(roomCode));
                const { votes, arena, allFighters, round } = snap.data();
                let counts = {}; arena.forEach(id => counts[id] = 0);
                if(votes) Object.values(votes).forEach(v => { if(v && counts[v.id] !== undefined) counts[v.id] += v.w; });
                
                let max = -1, candidates = [];
                for(let id in counts) {
                    if(counts[id] > max) { max = counts[id]; candidates = [parseInt(id)]; }
                    else if(counts[id] === max) candidates.push(parseInt(id));
                }

                const deadId = candidates[Math.floor(Math.random() * candidates.length)];
                
                arena.forEach(fid => {
                    if(fid !== deadId) {
                        const f = allFighters.find(x => x.id === fid);
                        if(f && f.teamId === myBetTeamId) {
                            myPower++;
                            if(myPower >= 15) { myPower = 0; myDoubleVotes++; showToast("⚡ VOTO X2 CARICO!"); }
                        }
                    }
                });

                const updatedFighters = allFighters.map(f => {
                    if(f.id === deadId) return { ...f, dead: true };
                    if(arena.includes(f.id)) return { ...f, wins: (f.wins || 0) + 1 };
                    return f;
                });

                await updateDoc(getRoomDoc(roomCode), { allFighters: updatedFighters, round: round + 1 });
                setTimeout(nextMatch, 1500);
            }, 1500);
        }

        async function nextMatch() {
            if(!isHost) return;
            const snap = await getDoc(getRoomDoc(roomCode));
            const data = snap.data();
            const alive = data.allFighters.filter(f => !f.dead);
            const r = data.round;

            if(alive.length <= 1) { await updateDoc(getRoomDoc(roomCode), { status: 'finished' }); return; }

            let arena = [];
            if(r % 20 === 0) {
                const isBest = (r / 20) % 2 !== 0; 
                const sorted = [...alive].sort((a,b) => isBest ? b.wins - a.wins : a.wins - b.wins);
                const selected = [];
                const usedTeams = new Set();
                for(let f of sorted) {
                    if(!usedTeams.has(f.teamId)) {
                        selected.push(f.id);
                        usedTeams.add(f.teamId);
                    }
                    if(selected.length >= 4) break;
                }
                arena = selected;
            } else {
                const activeTeams = [...new Set(alive.map(f => f.teamId))].sort(() => Math.random() - 0.5);
                arena = activeTeams.slice(0, 4).map(tid => {
                    const teamF = alive.filter(f => f.teamId === tid);
                    return teamF[Math.floor(Math.random() * teamF.length)].id;
                });
            }
            
            localVoted = false;
            await updateDoc(getRoomDoc(roomCode), { status: 'voting', arena, votes: {}, timerEnd: Date.now() + 15000 });
        }

        function renderArena(ids, votes, fighters, teams, round) {
            const container = document.getElementById('matchDisplay');
            const isSpecial = round > 0 && round % 20 === 0;
            const msgEl = document.getElementById('special-challenge-msg');
            
            if(isSpecial) {
                msgEl.innerText = (round / 20) % 2 !== 0 ? "🔥 SFIDA DEI MIGLIORI 🔥" : "💀 SFIDA DEI PEGGIORI 💀";
                msgEl.classList.remove('hidden');
            } else {
                msgEl.classList.add('hidden');
            }

            container.innerHTML = ids.map(id => {
                const f = fighters.find(x => x.id === id);
                const t = teams.find(x => x.id === f.teamId);
                const v = Object.values(votes || {}).filter(vote => vote.id === id).reduce((acc, curr) => acc + curr.w, 0);
                
                return `
                    <div onclick="castVote(${id})" class="cursor-pointer glass p-4 rounded-3xl w-40 flex flex-col items-center text-center transition-all hover:scale-105 border-4" style="border-color:${t.color}">
                        <div class="relative inline-block mb-3">
                            <img src="${f.i}" class="w-24 h-24 rounded-2xl object-cover shadow-2xl border-2" style="border-color:${t.color}">
                            <div class="win-badge">${f.wins || 0}</div>
                        </div>
                        <h3 class="font-black text-sm mb-1 uppercase truncate w-full">${f.n}</h3>
                        <span class="team-tag" style="background:${t.color}20; color:${t.color}">${t.name}</span>
                        <div class="mt-4 text-2xl font-black italic">${v} <span class="text-xs text-slate-500">VOTI</span></div>
                    </div>
                `;
            }).join('');
        }

        window.castVote = async (id) => {
            if(!currentUser || localVoted || roomData.status !== 'voting') return;
            const weight = (isDoubleActive && myDoubleVotes > 0) ? 2 : 1;
            localVoted = true;
            
            if(isDoubleActive && myDoubleVotes > 0) {
                myDoubleVotes--;
                isDoubleActive = false;
            }
            
            await updateDoc(getRoomDoc(roomCode), { [`votes.${currentUser.uid}`]: { id, w: weight } });
            showToast(weight === 2 ? "Voto DOPPIO inviato!" : "Voto inviato!");
        };

        function renderSuspense(arena, votes, fighters) {
            let counts = {}; arena.forEach(id => counts[id] = 0);
            if(votes) Object.values(votes).forEach(v => { if(v && counts[v.id] !== undefined) counts[v.id] += v.w; });
            const container = document.getElementById('reveal-votes');
            container.innerHTML = arena.map(id => {
                const f = fighters.find(x => x.id === id);
                return `<div class="text-center animate-pulse"><img src="${f.i}" class="w-16 h-16 rounded-full mb-2 mx-auto"><div class="font-black text-2xl text-red-500">${counts[id]}</div></div>`;
            }).join('');
        }

        function renderFinalVictory(fighters, teams) {
            const alive = fighters.filter(f => !f.dead);
            if(alive.length === 0) return;
            const winner = alive[0];
            const team = teams.find(t => t.id === winner.teamId);
            
            document.getElementById('winTeamName').innerText = team.name;
            document.getElementById('winTeamName').style.color = team.color;

            const teamMembers = fighters.filter(f => f.teamId === winner.teamId).sort((a,b) => (b.wins||0) - (a.wins||0));
            document.getElementById('win-team-members').innerHTML = teamMembers.map((m, i) => `
                <div class="text-center bg-slate-800/50 p-3 rounded-2xl ${i===0 ? 'gold-glow scale-110' : ''}">
                    <div class="relative inline-block mb-2">
                        <img src="${m.i}" class="w-12 h-12 rounded-full object-cover border-2" style="border-color:${team.color}">
                        ${i===0 ? '<div class="absolute -top-3 -right-3 text-xl">👑</div>' : ''}
                    </div>
                    <p class="text-[8px] font-black uppercase truncate w-16">${m.n}</p>
                    <p class="text-xs font-black text-yellow-500">${m.wins||0} W</p>
                </div>
            `).join('');
        }

        function renderTopStats(fighters, teams) {
            const teamStats = teams.map(t => {
                const members = fighters.filter(f => f.teamId === t.id && !f.dead);
                const wins = fighters.filter(f => f.teamId === t.id).reduce((sum, f) => sum + (f.wins||0), 0);
                return { ...t, alive: members.length, wins };
            }).sort((a,b) => b.alive !== a.alive ? b.alive - a.alive : b.wins - a.wins).slice(0, 5);

            document.getElementById('top-teams-list').innerHTML = teamStats.map(t => `
                <div class="flex items-center gap-2 bg-slate-800/80 px-3 py-1.5 rounded-lg border-l-2" style="border-left-color:${t.color}">
                    <span class="text-[10px] font-black uppercase truncate max-w-[60px]">${t.name}</span>
                    <span class="text-[10px] bg-slate-900 px-1.5 rounded font-black text-white">${t.alive}</span>
                </div>
            `).join('');

            const topFighters = [...fighters].filter(f => !f.dead).sort((a,b) => (b.wins||0) - (a.wins||0)).slice(0, 8);
            document.getElementById('top-fighters-list').innerHTML = topFighters.map(f => `
                <div class="relative w-8 h-8 shrink-0">
                    <img src="${f.i}" class="w-full h-full rounded-full object-cover border" style="border-color:${teams[f.teamId].color}">
                    <div class="win-badge" style="transform: scale(0.6); top: -2px; right: -2px;">${f.wins||0}</div>
                </div>
            `).join('');
        }

        function renderTeamsPanel(teams, fighters, arena) {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = teams.map(t => {
                const members = fighters.filter(f => f.teamId === t.id);
                const aliveMembers = members.filter(f => !f.dead);
                const isExtinct = aliveMembers.length === 0;
                const isMyTeam = t.id === myBetTeamId;

                return `
                <div class="min-w-[160px] glass p-3 rounded-2xl flex flex-col justify-between transition-all ${isMyTeam ? 'border-blue-500 border-2 bg-blue-900/20' : ''} ${isExtinct ? 'opacity-30 grayscale' : ''}">
                    <div>
                        <div class="flex justify-between items-center mb-2 pb-2 border-b border-white/10">
                            <span class="font-black text-xs uppercase" style="color:${t.color}">${t.name}</span>
                            <span class="text-[10px] font-black bg-slate-800 px-2 py-0.5 rounded-full">${aliveMembers.length}/10</span>
                        </div>
                        <div class="flex flex-wrap gap-1.5">
                            ${members.map(m => `
                                <img src="${m.i}" class="w-6 h-6 rounded object-cover ${m.dead ? 'opacity-20' : ''} ${arena?.includes(m.id) ? 'ring-2 ring-yellow-400 animate-pulse' : ''}">
                            `).join('')}
                        </div>
                    </div>
                    ${isMyTeam ? `
                    <div class="mt-2 pt-2 border-t border-white/5">
                        <div class="flex justify-between text-[7px] font-black text-yellow-500 uppercase mb-1"><span>X2 POWER</span><span>${myPower}/15</span></div>
                        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden border border-white/5 relative"><div class="h-full bg-yellow-500 transition-all duration-500" style="width:${(myPower/15)*100}%"></div></div>
                        <button onclick="toggleDoubleVote()" class="w-full mt-1 py-1 rounded-lg text-[9px] font-black uppercase transition-all ${myDoubleVotes > 0 ? (isDoubleActive ? 'active-double' : 'bg-yellow-600') : 'bg-slate-700 text-slate-500 cursor-not-allowed'}">⚡ USA X2 (${myDoubleVotes})</button>
                    </div>` : ''}
                </div>`;
            }).join('');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        window.startBettingPhase = async () => { if(isHost) await updateDoc(getRoomDoc(roomCode), { status: 'betting', timerEnd: Date.now() + 30000 }); };
        window.toggleDoubleVote = () => { if(myDoubleVotes > 0) { isDoubleActive = !isDoubleActive; renderTeamsPanel(roomData.teams, roomData.allFighters, roomData.arena); } };
    </script>
</body>
</html>
