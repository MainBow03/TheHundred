<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle of the Teams - Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            overflow-x: hidden;
        }

        .font-game {
            font-family: 'Bungee', cursive;
        }

        .team-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .team-card:hover {
            transform: translateY(-5px);
        }

        .voted {
            border: 4px solid #facc15 !important;
            box-shadow: 0 0 20px #facc15;
        }

        .progress-bar-inner {
            transition: width 0.5s ease-in-out;
        }

        .bench-container::-webkit-scrollbar {
            height: 8px;
        }
        .bench-container::-webkit-scrollbar-thumb {
            background: #4a5568;
            border-radius: 4px;
        }

        .eliminated {
            filter: grayscale(1) brightness(0.5);
            opacity: 0.6;
        }

        .winner-anim {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Schermata Iniziale / Menu -->
    <div id="setup-screen" class="flex flex-col items-center justify-center min-h-screen p-4">
        <h1 class="text-5xl font-game mb-8 text-yellow-400 text-center uppercase tracking-widest">Battle of the Teams</h1>
        
        <div id="main-menu" class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border-2 border-gray-700">
            <input type="text" id="player-name" placeholder="Inserisci il tuo Nome" class="w-full p-4 rounded-lg bg-gray-900 border border-gray-600 mb-6 focus:ring-2 focus:ring-yellow-400 outline-none text-xl">
            
            <div class="flex flex-col gap-4">
                <button onclick="showCreateRoom()" class="bg-green-600 hover:bg-green-700 text-white font-game py-4 px-6 rounded-lg transition-all text-xl">Crea Stanza</button>
                <div class="flex gap-2">
                    <input type="text" id="room-code-input" placeholder="Codice Stanza" class="flex-1 p-4 rounded-lg bg-gray-900 border border-gray-600 uppercase">
                    <button onclick="joinRoom()" class="bg-blue-600 hover:bg-blue-700 text-white font-game py-4 px-6 rounded-lg transition-all">Unisciti</button>
                </div>
            </div>
        </div>

        <div id="create-room-config" class="hidden bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border-2 border-gray-700">
            <h2 class="text-2xl font-game mb-6 text-center">Configura Partita</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block mb-2 text-gray-400">Numero di Team (2-20)</label>
                    <input type="range" id="config-teams" min="2" max="20" value="10" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-yellow-400">
                    <span id="val-teams" class="block text-center text-yellow-400 font-bold">10 Team</span>
                </div>
                <div>
                    <label class="block mb-2 text-gray-400">Membri per Team (2-10)</label>
                    <input type="range" id="config-members" min="2" max="10" value="10" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-yellow-400">
                    <span id="val-members" class="block text-center text-yellow-400 font-bold">10 Membri</span>
                </div>
                <div class="flex gap-4 mt-6">
                    <button onclick="hideCreateRoom()" class="flex-1 bg-gray-600 py-3 rounded-lg font-game">Indietro</button>
                    <button onclick="createRoom()" class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-black py-3 rounded-lg font-game">Avvia Host</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Lobby Attesa -->
    <div id="lobby-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <div class="bg-gray-800 p-8 rounded-2xl w-full max-w-lg text-center">
            <h2 class="text-3xl font-game mb-4">Stanza: <span id="display-room-code" class="text-yellow-400">---</span></h2>
            <p class="text-gray-400 mb-6">In attesa dei giocatori...</p>
            <div id="lobby-players" class="flex flex-wrap justify-center gap-2 mb-8"></div>
            <button id="start-game-btn" onclick="startGame()" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-game py-4 rounded-lg">Inizia Partita</button>
        </div>
    </div>

    <!-- Schermata di Tifo (Iniziale) -->
    <div id="tifo-screen" class="hidden flex flex-col items-center justify-center min-h-screen p-4">
        <h2 class="text-4xl font-game mb-4 text-yellow-400">Scegli il tuo Team!</h2>
        <div id="tifo-timer" class="text-6xl font-game mb-8">30</div>
        <div id="tifo-options" class="grid grid-cols-2 md:grid-cols-5 gap-4 w-full max-w-6xl"></div>
    </div>

    <!-- Area di Gioco -->
    <div id="game-screen" class="hidden flex flex-col min-h-screen p-4 bg-gray-900">
        <!-- Header: Top Classifiche -->
        <div class="flex flex-col lg:flex-row gap-8 mb-8 justify-center items-start">
            <div class="bg-gray-800 p-4 rounded-xl shadow-lg border-b-4 border-blue-500 w-full lg:w-80">
                <h3 class="font-game text-sm mb-2 text-center text-blue-400">Top 5 Team (Superstiti)</h3>
                <div id="top-5-teams" class="space-y-2"></div>
            </div>
            
            <div class="flex-1 flex flex-col items-center">
                <div id="round-timer" class="text-5xl font-game text-yellow-400 mb-2">15</div>
                <div id="game-status" class="text-xl font-game text-gray-400 uppercase tracking-widest">Fase di Voto</div>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl shadow-lg border-b-4 border-red-500 w-full lg:w-80">
                <h3 class="font-game text-sm mb-2 text-center text-red-400">Top 10 Guerrieri (Punti)</h3>
                <div id="top-10-warriors" class="space-y-2"></div>
            </div>
        </div>

        <!-- Arena Centrale -->
        <div id="arena" class="flex-1 flex flex-wrap justify-center items-center gap-6 p-4"></div>

        <!-- Barra di tifo personale -->
        <div id="my-team-boost" class="max-w-2xl mx-auto w-full bg-gray-800 p-4 rounded-xl mb-6 hidden">
            <div class="flex justify-between items-center mb-2">
                <span class="font-game text-sm">Boost Team: <span id="fav-team-name">N/A</span></span>
                <span id="boost-points" class="font-game text-yellow-400">0 / 15</span>
            </div>
            <div class="w-full bg-gray-700 h-4 rounded-full overflow-hidden">
                <div id="boost-bar" class="progress-bar-inner h-full bg-yellow-400" style="width: 0%"></div>
            </div>
            <button id="use-boost-btn" onclick="activateBoost()" class="mt-4 w-full bg-yellow-500 text-black font-game py-2 rounded-lg hidden animate-pulse">ATTIVA X2 VOTO!</button>
        </div>

        <!-- Panchina / Tutti i Team -->
        <div class="bench-container overflow-x-auto flex gap-4 p-4 bg-gray-800 rounded-2xl border-t-2 border-gray-700 mt-auto">
            <div id="bench-teams" class="flex gap-8"></div>
        </div>
    </div>

    <!-- Schermata Vincitore Finale -->
    <div id="winner-screen" class="hidden fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-50 p-8">
        <h2 class="text-6xl font-game text-yellow-400 mb-4 text-center">TEAM VINCITORE!</h2>
        <h3 id="winner-team-name" class="text-4xl font-game mb-12 uppercase tracking-widest">---</h3>
        <div id="winner-members-list" class="flex flex-wrap justify-center gap-6"></div>
        <button onclick="location.reload()" class="mt-12 bg-white text-black font-game px-8 py-4 rounded-lg text-2xl">Torna al Menu</button>
    </div>

    <!-- Alert Custom -->
    <div id="custom-alert" class="hidden fixed top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white p-4 rounded-lg shadow-2xl z-[100] font-game">
        <span id="alert-msg">Errore!</span>
    </div>

        { id: "mlp8", n: "P. Celestia", img: "https://i.pinimg.com/736x/21/c3/23/21c323cbf88db5e13b006265171dabfd.jpg" },
        { id: "mlp9", n: "P. Luna", img: "https://i.pinimg.com/1200x/9a/41/7a/9a417ac0118a68f5556588fa5f934800.jpg" },
        { id: "mlp10", n: "Discord", img: "https://i.pinimg.com/1200x/63/52/e2/6352e28fc4e458322243cedd5b70a2df.jpg" }
    ]}
];

        // --- STATE VARIABLES ---
        let currentRoom = null;
        let isHost = false;
        let myName = "";
        let userId = "";
        let gameState = null;
        let favoriteTeam = null;
        let boostPoints = 0;
        let hasBoost = false;
        let currentVote = null;
        let timerInterval = null;

        // --- INITIALIZATION ---
        window.onload = async () => {
            // Auth
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
            } else {
                await auth.signInAnonymously();
            }
            userId = auth.currentUser.uid;

            // UI Elements
            const configTeams = document.getElementById('config-teams');
            const configMembers = document.getElementById('config-members');
            
            configTeams.oninput = () => document.getElementById('val-teams').innerText = configTeams.value + " Team";
            configMembers.oninput = () => document.getElementById('val-members').innerText = configMembers.value + " Membri";
        };

        // --- NAVIGATION ---
        function showCreateRoom() {
            if(!validateName()) return;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('create-room-config').classList.remove('hidden');
        }

        function hideCreateRoom() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('create-room-config').classList.add('hidden');
        }

        function validateName() {
            myName = document.getElementById('player-name').value.trim();
            if(!myName) { showAlert("Inserisci un nome!"); return false; }
            return true;
        }

        function showAlert(msg) {
            const el = document.getElementById('custom-alert');
            document.getElementById('alert-msg').innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        // --- MULTIPLAYER LOGIC ---
        async function createRoom() {
            isHost = true;
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            const numTeams = parseInt(document.getElementById('config-teams').value);
            const numMembers = parseInt(document.getElementById('config-members').value);

            // Seleziona Team e Membri casuali
            const selectedTeams = [...ALL_TEAMS_DATA].sort(() => 0.5 - Math.random()).slice(0, numTeams);
            const gameTeams = selectedTeams.map(t => {
                const members = [...t.members].sort(() => 0.5 - Math.random()).slice(0, numMembers);
                return {
                    name: t.name,
                    color: t.color,
                    members: members.map(m => ({ ...m, points: 0, alive: true }))
                };
            });

            const roomData = {
                code: code,
                hostId: userId,
                players: [{ id: userId, name: myName }],
                status: 'lobby',
                teams: gameTeams,
                currentRound: 0,
                challengers: [],
                votes: {},
                phase: 'lobby', // lobby, tifo, voting, results, winner
                timer: 0
            };

            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(code).set(roomData);
            enterRoom(code);
        }

        async function joinRoom() {
            if(!validateName()) return;
            const code = document.getElementById('room-code-input').value.trim().toUpperCase();
            if(!code) return;

            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(code);
            const doc = await docRef.get();

            if(!doc.exists) { showAlert("Stanza non trovata!"); return; }
            
            const data = doc.data();
            if(data.status !== 'lobby') { showAlert("Partita già iniziata!"); return; }

            await docRef.update({
                players: firebase.firestore.FieldValue.arrayUnion({ id: userId, name: myName })
            });

            enterRoom(code);
        }

        function enterRoom(code) {
            currentRoom = code;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
            document.getElementById('display-room-code').innerText = code;

            // Ascolta cambiamenti stanza
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(code)
                .onSnapshot(doc => {
                    if(!doc.exists) return;
                    updateUI(doc.data());
                }, err => console.error("Snapshot error:", err));
        }

        // --- GAME LOOP ---
        function updateUI(data) {
            gameState = data;
            
            // Lobby Players
            const playersList = document.getElementById('lobby-players');
            playersList.innerHTML = data.players.map(p => `<span class="bg-gray-700 px-3 py-1 rounded-full text-sm">${p.name}</span>`).join('');

            if(isHost && data.status === 'lobby') {
                document.getElementById('start-game-btn').classList.remove('hidden');
            }

            // Phase Management
            if(data.phase === 'tifo') showTifoPhase();
            if(data.phase === 'voting') showVotingPhase();
            if(data.phase === 'results') showResultsPhase();
            if(data.phase === 'winner') showWinnerPhase();
        }

        async function startGame() {
            if(!isHost) return;
            await updateRoom({ status: 'playing', phase: 'tifo', timer: 30 });
            startTimer(30, async () => {
                await setupNextRound();
            });
        }

        function showTifoPhase() {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('tifo-screen').classList.remove('hidden');
            const grid = document.getElementById('tifo-options');
            if(grid.innerHTML === "") {
                grid.innerHTML = gameState.teams.map(t => `
                    <button onclick="pickFavorite('${t.name}')" class="bg-gray-800 p-4 rounded-xl border-b-4 border-[${t.color}] hover:scale-105 transition-all">
                        <span class="font-game text-xs">${t.name}</span>
                    </button>
                `).join('');
            }
            document.getElementById('tifo-timer').innerText = gameState.timer;
        }

        function pickFavorite(teamName) {
            if(favoriteTeam) return;
            favoriteTeam = teamName;
            showAlert("Tifi per: " + teamName);
            document.getElementById('fav-team-name').innerText = teamName;
            document.getElementById('my-team-boost').classList.remove('hidden');
        }

        async function setupNextRound() {
            if(!isHost) return;

            // Scegli 4 sfidanti random da team diversi
            const aliveWarriors = [];
            gameState.teams.forEach(t => {
                t.members.forEach(m => {
                    if(m.alive) aliveWarriors.push({ ...m, team: t.name, color: t.color });
                });
            });

            if(isGameOver()) return;

            // Filtra guerrieri: max 1 per team per round
            const shuffled = aliveWarriors.sort(() => 0.5 - Math.random());
            const picked = [];
            const pickedTeams = new Set();
            for(let w of shuffled) {
                if(!pickedTeams.has(w.team)) {
                    picked.push(w);
                    pickedTeams.add(w.team);
                }
                if(picked.length === 4) break;
            }

            await updateRoom({ 
                phase: 'voting', 
                challengers: picked, 
                timer: 15,
                votes: {} 
            });

            startTimer(15, async () => {
                await processElimination();
            });
        }

        function showVotingPhase() {
            document.getElementById('tifo-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-status').innerText = "Fase di Voto";
            document.getElementById('round-timer').innerText = gameState.timer;
            
            const arena = document.getElementById('arena');
            arena.innerHTML = gameState.challengers.map(c => `
                <div onclick="castVote('${c.id}')" id="card-${c.id}" class="team-card bg-gray-800 p-2 rounded-xl border-4 border-transparent cursor-pointer relative w-40 md:w-52">
                    <div class="absolute top-1 right-1 bg-yellow-400 text-black text-xs font-bold px-2 py-0.5 rounded-full z-10">Pts: ${c.points}</div>
                    <img src="${c.img}" class="w-full h-48 md:h-64 object-cover rounded-lg mb-2">
                    <div class="text-center">
                        <div class="font-bold truncate">${c.n}</div>
                        <div class="text-xs font-game" style="color: ${c.color}">${c.team}</div>
                    </div>
                </div>
            `).join('');

            updateBench();
            updateStats();
        }

        async function castVote(warriorId) {
            if(currentVote) return;
            currentVote = warriorId;
            document.getElementById(`card-${warriorId}`).classList.add('voted');
            
            const weight = hasBoost ? 2 : 1;
            if(hasBoost) {
                hasBoost = false;
                boostPoints = 0;
                updateBoostUI();
            }

            const newVotes = { ...gameState.votes };
            newVotes[userId] = { id: warriorId, w: weight };
            
            await updateRoom({ votes: newVotes });

            // Se tutti hanno votato, accelera
            const totalPlayers = gameState.players.length;
            const currentVotes = Object.keys(newVotes).length;
            if(isHost && currentVotes >= totalPlayers) {
                await processElimination();
            }
        }

        async function processElimination() {
            if(!isHost) return;
            
            // Calcola voti
            const tallies = {};
            gameState.challengers.forEach(c => tallies[c.id] = 0);
            Object.values(gameState.votes).forEach(v => {
                tallies[v.id] = (tallies[v.id] || 0) + v.w;
            });

            // Chi ha più voti?
            let maxVotes = -1;
            let eliminatedId = null;
            Object.entries(tallies).forEach(([id, count]) => {
                if(count > maxVotes) {
                    maxVotes = count;
                    eliminatedId = id;
                }
            });

            // Se pareggio o nessuno ha votato, random tra i 4
            if(!eliminatedId) eliminatedId = gameState.challengers[Math.floor(Math.random() * 4)].id;

            // Aggiorna Stato Mondiale
            const nextTeams = JSON.parse(JSON.stringify(gameState.teams));
            let eliminatedName = "";
            nextTeams.forEach(t => {
                t.members.forEach(m => {
                    if(m.id === eliminatedId) {
                        m.alive = false;
                        eliminatedName = m.n;
                    } else if(gameState.challengers.find(c => c.id === m.id)) {
                        // Chi non è stato eliminato prende un punto
                        m.points += 1;
                    }
                });
            });

            await updateRoom({ 
                phase: 'results', 
                teams: nextTeams, 
                lastEliminated: eliminatedId,
                tallies: tallies,
                timer: 2 
            });

            setTimeout(async () => {
                if(isGameOver()) return;
                currentVote = null;
                await setupNextRound();
            }, 2000);
        }

        function isGameOver() {
            const aliveTeams = gameState.teams.filter(t => t.members.some(m => m.alive));
            const aliveCount = gameState.teams.reduce((acc, t) => acc + t.members.filter(m => m.alive).length, 0);

            if(aliveTeams.length <= 1 || aliveCount <= 1) {
                declareWinner(aliveTeams[0] || gameState.teams[0]);
                return true;
            }
            return false;
        }

        async function declareWinner(team) {
            await updateRoom({ phase: 'winner', winner: team });
        }

        function showResultsPhase() {
            const elId = gameState.lastEliminated;
            const card = document.getElementById(`card-${elId}`);
            if(card) {
                card.classList.add('eliminated');
                card.innerHTML += `<div class="absolute inset-0 flex items-center justify-center font-game text-red-500 text-3xl rotate-12">ELIMINATO</div>`;
            }
            
            // Logica Boost: Se il mio team è passato
            if(favoriteTeam) {
                const myTeamData = gameState.teams.find(t => t.name === favoriteTeam);
                const wasChallengerAndSurvived = gameState.challengers.some(c => c.team === favoriteTeam && c.id !== elId);
                if(wasChallengerAndSurvived) {
                    boostPoints += 3; // Punti per passaggio turno
                    if(boostPoints > 15) boostPoints = 15;
                    updateBoostUI();
                }
            }
        }

        function updateBoostUI() {
            const bar = document.getElementById('boost-bar');
            const txt = document.getElementById('boost-points');
            const btn = document.getElementById('use-boost-btn');
            
            bar.style.width = (boostPoints / 15 * 100) + "%";
            txt.innerText = `${boostPoints} / 15`;
            
            if(boostPoints >= 15 && !hasBoost) {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        function activateBoost() {
            hasBoost = true;
            showAlert("VOTO POTENZIATO ATTIVATO!");
            document.getElementById('use-boost-btn').classList.add('hidden');
        }

        function showWinnerPhase() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('winner-screen').classList.remove('hidden');
            const win = gameState.winner;
            document.getElementById('winner-team-name').innerText = win.name;
            document.getElementById('winner-team-name').style.color = win.color;

            const list = document.getElementById('winner-members-list');
            // Ordina per punti decrescente
            const sorted = [...win.members].sort((a, b) => b.points - a.points);
            list.innerHTML = sorted.map(m => `
                <div class="flex flex-col items-center bg-gray-800 p-4 rounded-xl winner-anim">
                    <img src="${m.img}" class="w-32 h-32 object-cover rounded-full border-4 border-yellow-400 mb-2">
                    <span class="font-bold">${m.n}</span>
                    <span class="text-yellow-400 text-sm">Punti: ${m.points}</span>
                </div>
            `).join('');
        }

        // --- UI HELPERS ---
        function updateStats() {
            // Top 5 Teams (per membri vivi)
            const teamStats = gameState.teams.map(t => ({
                name: t.name,
                alive: t.members.filter(m => m.alive).length,
                color: t.color
            })).sort((a, b) => b.alive - a.alive).slice(0, 5);

            document.getElementById('top-5-teams').innerHTML = teamStats.map((t, i) => `
                <div class="flex justify-between items-center text-xs">
                    <span style="color: ${t.color}">${i+1}. ${t.name}</span>
                    <span class="font-bold">${t.alive} vivi</span>
                </div>
            `).join('');

            // Top 10 Guerrieri (per punti)
            const allWarriors = [];
            gameState.teams.forEach(t => t.members.forEach(m => allWarriors.push({ ...m, team: t.name })));
            const topWarriors = allWarriors.sort((a, b) => b.points - a.points).slice(0, 10);

            document.getElementById('top-10-warriors').innerHTML = topWarriors.map((w, i) => `
                <div class="flex justify-between items-center text-xs">
                    <span>${i+1}. ${w.n}</span>
                    <span class="text-yellow-400">${w.points} pts</span>
                </div>
            `).join('');
        }

        function updateBench() {
            const bench = document.getElementById('bench-teams');
            bench.innerHTML = gameState.teams.map(t => `
                <div class="flex flex-col items-center min-w-[120px]">
                    <h4 class="text-[10px] font-game mb-2 truncate w-full text-center" style="color: ${t.color}">${t.name}</h4>
                    <div class="grid grid-cols-5 gap-1">
                        ${t.members.map(m => `
                            <div class="w-4 h-4 rounded-sm ${m.alive ? '' : 'bg-red-900 eliminated'}" style="background-image: url('${m.img}'); background-size: cover;"></div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // --- UTILS ---
        async function updateRoom(updates) {
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(currentRoom).update(updates);
        }

        function startTimer(seconds, callback) {
            clearInterval(timerInterval);
            let t = seconds;
            timerInterval = setInterval(async () => {
                t--;
                if(isHost) await updateRoom({ timer: t });
                if(t <= 0) {
                    clearInterval(timerInterval);
                    if(isHost) callback();
                }
            }, 1000);
        }
    </script>
</body>
</html>
