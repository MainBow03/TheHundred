<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo dei 100 - Pro Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'system-ui', sans-serif; overflow: hidden; height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .win-badge {
            position: absolute; top: -10px; right: -10px;
            background: linear-gradient(45deg, #f59e0b, #b45309);
            color: white; font-size: 16px; font-weight: 900;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 3px solid #0f172a; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 15px #f59e0b; } 50% { box-shadow: 0 0 30px #f59e0b; } }
        .active-double { animation: pulse-gold 1.5s infinite; border-color: #f59e0b !important; background: #b45309 !important; }
        
        .gold-glow { box-shadow: 0 0 50px rgba(245, 158, 11, 0.5); border: 4px solid #f59e0b; }
        .vanish { animation: vanish-anim 2s forwards ease-in; }
        @keyframes vanish-anim { 
            0% { opacity: 1; transform: scale(1); filter: brightness(1); } 
            50% { transform: scale(1.1); filter: brightness(2) contrast(1.5); } 
            100% { opacity: 0; transform: scale(0.1) translateY(-200px); filter: brightness(3) blur(10px); } 
        }
        
        .vote-hidden { filter: blur(12px); opacity: 0.1; transition: all 0.5s ease; }
        .vote-visible { filter: blur(0); opacity: 1; transform: scale(1.1); color: #ef4444; }

        /* Effetto Spotlights per l'Arena */
        .arena-bg {
            background: radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.15) 0%, transparent 70%);
        }

        .fighter-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fighter-card:hover { transform: translateY(-15px) scale(1.05); }
    </style>
</head>
<body class="flex flex-col">

    <!-- Schermata Iniziale -->
    <div id="menu-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-4">
        <div class="max-w-lg w-full glass p-12 rounded-[4rem] border-blue-500/20 shadow-2xl text-center">
            <h1 class="text-7xl font-black italic mb-2 tracking-tighter">TORNEO <span class="text-blue-500 text-8xl">100</span></h1>
            <p class="text-slate-500 text-sm font-bold uppercase tracking-[0.3em] mb-12">Elite Battle Royale</p>
            <input id="nick-input" type="text" placeholder="IL TUO NOME DI BATTAGLIA" maxlength="12" class="w-full p-6 rounded-3xl bg-slate-900 border border-slate-700 text-center font-black mb-6 text-white text-2xl outline-none focus:ring-4 ring-blue-500/50">
            <div class="space-y-4">
                <button onclick="handleCreateRoom()" class="w-full bg-blue-600 p-6 rounded-3xl font-black text-2xl uppercase hover:bg-blue-500 transition-all shadow-[0_0_30px_rgba(37,99,235,0.4)]">Crea Stanza</button>
                <div class="flex gap-3">
                    <input id="join-code-input" type="text" placeholder="CODICE" maxlength="5" class="flex-1 p-5 rounded-3xl bg-slate-900 border border-slate-700 text-center font-black uppercase text-2xl">
                    <button onclick="handleJoinRoom()" class="bg-slate-800 px-10 rounded-3xl font-black uppercase hover:bg-slate-700 transition-colors border border-white/5">ENTRA</button>
                </div>
            </div>
            <p id="auth-status" class="mt-8 text-xs text-slate-600 font-bold uppercase tracking-widest italic">Inizializzazione Neural Link...</p>
        </div>
    </div>

    <!-- Interfaccia Gioco Principale -->
    <div id="game-screen" class="hidden flex-1 flex flex-col h-screen overflow-hidden">
        
        <!-- Header Snello -->
        <div class="bg-slate-950/80 border-b border-white/5 px-6 py-2 flex items-center justify-between z-20">
            <div class="flex items-center gap-6">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">RANKING SQUADRE</span>
                    <div id="top-teams-list" class="flex gap-2"></div>
                </div>
                <div class="h-8 w-[1px] bg-white/10 mx-2"></div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">TOP 10 GUERRIERI</span>
                    <div id="top-fighters-list" class="flex gap-2"></div>
                </div>
            </div>
            
            <div id="round-info" class="text-center">
                <h2 id="round-display" class="text-3xl font-black italic text-blue-500 leading-none">ROUND 1</h2>
                <div class="w-48 bg-slate-800 h-1.5 rounded-full mt-2 overflow-hidden border border-white/5">
                    <div id="timer-bar" class="h-full bg-blue-500 w-full transition-all duration-100 linear"></div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-right">
                    <span class="text-[10px] text-blue-400 block font-bold leading-none uppercase">ID Stanza</span>
                    <span id="display-room-code" class="font-black text-xl tracking-tighter">---</span>
                </div>
            </div>
        </div>

        <!-- Mega Arena Centrale (Ampia e Aperta) -->
        <main class="flex-1 relative arena-bg flex items-center justify-center p-4">
            
            <!-- Overlay Eventi Speciali -->
            <div id="team-extinction-overlay" class="hidden absolute inset-0 z-50 bg-slate-950/95 flex flex-col items-center justify-center p-8 text-center">
                <div class="text-9xl mb-6 animate-pulse">💀</div>
                <h2 class="text-7xl font-black italic uppercase mb-16 leading-tight tracking-tighter" id="extinction-msg"></h2>
                <div id="extinction-grid" class="flex flex-wrap justify-center gap-8 max-w-6xl"></div>
            </div>

            <div id="special-challenge-msg" class="hidden absolute top-12 z-40 bg-white text-black px-16 py-4 text-2xl font-black italic uppercase rounded-full shadow-[0_0_50px_rgba(255,255,255,0.4)] animate-bounce"></div>

            <!-- Sezione Votazione -->
            <div id="voting-arena" class="hidden w-full h-full flex flex-col items-center justify-center">
                <div class="mb-8 text-center">
                    <h2 class="text-4xl font-black italic uppercase tracking-tighter text-white">CHI DEVE <span class="text-red-600">CADERE</span>?</h2>
                    <p id="votes-counter" class="text-slate-500 font-bold uppercase tracking-widest mt-1">ATTESA VOTI (0/0)</p>
                </div>
                
                <div id="matchDisplay" class="flex flex-wrap justify-center gap-8 md:gap-12 w-full max-w-7xl">
                    <!-- Cards generate dinamicamente -->
                </div>
            </div>

            <!-- Scommesse -->
            <div id="betting-screen" class="hidden w-full max-w-4xl text-center">
                <h2 class="text-6xl font-black italic uppercase mb-12 tracking-tighter">Scegli la tua Squadra</h2>
                <div id="bet-options" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
            </div>

            <!-- Suspense -->
            <div id="suspense-screen" class="hidden text-center scale-125">
                <div id="reveal-votes" class="flex justify-center gap-12 mb-10"></div>
                <h2 class="text-8xl font-black italic text-red-600 uppercase tracking-tighter animate-pulse">ELIMINATO!</h2>
            </div>

            <!-- Lobby -->
            <div id="waiting-lobby" class="text-center glass p-16 rounded-[4rem] border-blue-500/10">
                <h2 class="text-4xl font-black text-white mb-10 italic uppercase tracking-widest">Pronti alla Guerra</h2>
                <div id="lobby-list" class="flex flex-wrap justify-center gap-4 mb-12"></div>
                <div id="host-controls" class="hidden">
                    <button onclick="startBettingPhase()" class="bg-blue-600 px-20 py-8 rounded-[2.5rem] font-black text-3xl shadow-2xl hover:bg-blue-500 transition-all transform hover:scale-105 uppercase italic tracking-tighter">Inizia il Torneo</button>
                </div>
            </div>

            <!-- Vittoria Finale -->
            <div id="victory-screen" class="hidden absolute inset-0 bg-slate-950 z-[60] flex flex-col items-center justify-center p-8 overflow-y-auto">
                <div class="text-9xl mb-4 animate-bounce">🏆</div>
                <h2 id="winTeamName" class="text-9xl font-black uppercase italic mb-16 tracking-tighter">CAMPIONI</h2>
                <div class="glass p-12 rounded-[5rem] w-full max-w-6xl border-yellow-500/20">
                    <div id="win-team-members" class="flex flex-wrap justify-center gap-10"></div>
                </div>
                <button onclick="location.reload()" class="mt-16 bg-white text-black px-16 py-6 rounded-full font-black uppercase text-2xl hover:scale-110 transition-transform">Nuova Partita</button>
            </div>
        </main>

        <!-- Footer Team (Più Sottile) -->
        <div id="teamsContainer" class="h-[180px] bg-slate-900/40 backdrop-blur-md border-t border-white/5 p-4 flex gap-4 overflow-x-auto custom-scrollbar z-20"></div>
    </div>

    <div id="toast" class="fixed bottom-48 left-1/2 -translate-x-1/2 glass px-12 py-6 rounded-full font-black text-xl hidden z-[200] border-2 border-blue-500 shadow-2xl text-blue-400"></div>

        ];

        const teamNames = ["Titani", "Abisso", "Foresta", "Fulmine", "Nebula", "Inferno", "Glaciali", "Sabbia", "Corazza", "Spiriti"];
        const teamColors = ["#ef4444", "#3b82f6", "#22c55e", "#eab308", "#a855f7", "#ec4899", "#06b6d4", "#f97316", "#14b8a6", "#8b5cf6"];

        let currentUser = null, nick = "", roomCode = "", isHost = false, roomData = null, timerInt = null;
        let myBetTeamId = null, myPower = 0, myDoubleVotes = 0, isDoubleActive = false, localVoted = false;

        const getRoomDoc = (code) => doc(db, 'artifacts', appId, 'public', 'data', 'rooms', code);

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, u => { 
            if(u) { currentUser = u; document.getElementById('auth-status').innerText = "COLLEGAMENTO STABILE"; } 
            else { initAuth(); }
        });
        initAuth();

        window.handleCreateRoom = async () => {
            nick = document.getElementById('nick-input').value.trim();
            if(!nick) return showToast("Scegli un nome!");
            roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
            isHost = true;
            const shuffled = [...rawPool].sort(() => Math.random() - 0.5);
            const fighters = shuffled.map((c, i) => ({ id: i, n: c.n, i: c.i, dead: false, wins: 0, teamId: Math.floor(i/10) }));
            const teams = teamNames.map((n, i) => ({ id: i, name: n, color: teamColors[i] }));
            await setDoc(getRoomDoc(roomCode), { 
                host: currentUser.uid, status: 'waiting', players: [{ uid: currentUser.uid, nick }], 
                teams, allFighters: fighters, round: 1, timerEnd: 0, arena: [], votes: {} 
            });
            enterGame();
        };

        window.handleJoinRoom = async () => {
            const code = document.getElementById('join-code-input').value.trim().toUpperCase();
            nick = document.getElementById('nick-input').value.trim();
            if(!nick || !code) return;
            const snap = await getDoc(getRoomDoc(code));
            if(!snap.exists()) return showToast("Codice errato!");
            roomCode = code;
            await updateDoc(getRoomDoc(code), { players: arrayUnion({ uid: currentUser.uid, nick }) });
            enterGame();
        };

        function enterGame() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-room-code').innerText = roomCode;
            onSnapshot(getRoomDoc(roomCode), snap => { 
                if(snap.exists()) { 
                    const oldData = roomData;
                    roomData = snap.data(); 
                    if(oldData) checkTeamExtinction(oldData, roomData);
                    updateUI(); 
                    if(isHost && roomData.status === 'voting') {
                        const total = roomData.players.length;
                        const votted = Object.keys(roomData.votes || {}).length;
                        if(votted >= total && roomData.timerEnd > Date.now() + 500) {
                            updateDoc(getRoomDoc(roomCode), { timerEnd: Date.now() });
                        }
                    }
                } 
            });
        }

        async function checkTeamExtinction(old, current) {
            for(let tid = 0; tid < 10; tid++) {
                const wasAlive = old.allFighters.filter(f => !f.dead && f.teamId === tid).length > 0;
                const isNowDead = current.allFighters.filter(f => !f.dead && f.teamId === tid).length === 0;
                if(wasAlive && isNowDead) {
                    const team = current.teams[tid];
                    const members = current.allFighters.filter(f => f.teamId === tid);
                    const overlay = document.getElementById('team-extinction-overlay');
                    document.getElementById('extinction-msg').innerText = `TEAM ${team.name} ELIMINATO`;
                    document.getElementById('extinction-msg').style.color = team.color;
                    document.getElementById('extinction-grid').innerHTML = members.map(m => `
                        <div class="vanish flex flex-col items-center">
                            <img src="${m.i}" class="w-32 h-32 rounded-[2rem] object-cover border-4" style="border-color:${team.color}">
                            <p class="font-black mt-3 uppercase text-sm">${m.n}</p>
                        </div>
                    `).join('');
                    overlay.classList.remove('hidden');
                    setTimeout(() => overlay.classList.add('hidden'), 5000);
                }
            }
        }

        function updateUI() {
            const { status, round, teams, allFighters, arena, votes, timerEnd, players } = roomData;
            document.getElementById('round-display').innerText = `ROUND ${round}`;
            document.getElementById('waiting-lobby').classList.toggle('hidden', status !== 'waiting');
            document.getElementById('betting-screen').classList.toggle('hidden', status !== 'betting');
            document.getElementById('voting-arena').classList.toggle('hidden', status !== 'voting');
            document.getElementById('suspense-screen').classList.toggle('hidden', status !== 'suspense');
            document.getElementById('victory-screen').classList.toggle('hidden', status !== 'finished');
            if(isHost) document.getElementById('host-controls').classList.toggle('hidden', status !== 'waiting');
            
            if(status === 'waiting') {
                document.getElementById('lobby-list').innerHTML = players.map(p => `<span class="bg-blue-500/10 px-6 py-3 rounded-2xl font-black text-blue-400 border border-blue-500/30">${p.nick}</span>`).join('');
            }
            if(status === 'betting') { renderBetOptions(teams); startTimer(timerEnd, 30000); }
            if(status === 'voting') { 
                const votted = Object.keys(votes || {}).length;
                document.getElementById('votes-counter').innerText = `ATTESA VOTI (${votted}/${players.length})`;
                renderArena(arena, votes, allFighters, teams, round, players.length); 
                startTimer(timerEnd, 15000); 
            }
            if(status === 'suspense') { renderSuspense(arena, votes, allFighters); }
            if(status === 'finished') { renderFinalVictory(allFighters, teams); }
            renderTopStats(allFighters, teams);
            renderTeamsPanel(teams, allFighters, arena);
        }

        function renderBetOptions(teams) {
            if(myBetTeamId !== null) {
                document.getElementById('bet-options').innerHTML = `<div class="col-span-full py-10"><p class="text-3xl font-black uppercase text-blue-500 italic animate-pulse">Squadra Selezionata!</p></div>`;
                return;
            }
            document.getElementById('bet-options').innerHTML = teams.map(t => `
                <button onclick="submitBet(${t.id}, '${t.name}')" class="glass p-6 rounded-3xl border-b-4 hover:scale-105 transition-all font-black uppercase" style="border-bottom-color:${t.color}">
                    <span style="color:${t.color}">${t.name}</span>
                </button>
            `).join('');
        }

        window.submitBet = async (tid) => {
            myBetTeamId = tid;
            await updateDoc(getRoomDoc(roomCode), { [`bets.${currentUser.uid}`]: tid });
        };

        function startTimer(endTime, duration) {
            if(timerInt) clearInterval(timerInt);
            timerInt = setInterval(() => {
                const diff = endTime - Date.now();
                const perc = Math.max(0, (diff / duration) * 100);
                document.getElementById('timer-bar').style.width = perc + '%';
                if(diff <= 0) { 
                    clearInterval(timerInt); 
                    if(isHost) { 
                        if(roomData.status === 'betting') nextMatch(); 
                        else if(roomData.status === 'voting') processRound(); 
                    } 
                }
            }, 100);
        }

        async function processRound() {
            if(!isHost) return;
            await updateDoc(getRoomDoc(roomCode), { status: 'suspense' });
            setTimeout(async () => {
                const snap = await getDoc(getRoomDoc(roomCode));
                const d = snap.data();
                let counts = {}; d.arena.forEach(id => counts[id] = 0);
                if(d.votes) Object.values(d.votes).forEach(v => { if(counts[v.id] !== undefined) counts[v.id] += v.w; });
                let max = -1, cands = [];
                for(let id in counts) { if(counts[id]>max){max=counts[id]; cands=[parseInt(id)];} else if(counts[id]===max)cands.push(parseInt(id)); }
                const deadId = cands[Math.floor(Math.random()*cands.length)];
                
                const updated = d.allFighters.map(f => {
                    if(f.id === deadId) return { ...f, dead: true };
                    if(d.arena.includes(f.id)) return { ...f, wins: (f.wins||0)+1 };
                    return f;
                });
                await updateDoc(getRoomDoc(roomCode), { allFighters: updated, round: d.round + 1 });
                setTimeout(nextMatch, 3000);
            }, 2000);
        }

        async function nextMatch() {
            const snap = await getDoc(getRoomDoc(roomCode));
            const d = snap.data();
            const alive = d.allFighters.filter(f => !f.dead);
            if(alive.length <= 1) { await updateDoc(getRoomDoc(roomCode), { status: 'finished' }); return; }
            
            let arena = [];
            if(d.round % 20 === 0) {
                const isBest = (d.round/20)%2!==0;
                const sorted = [...alive].sort((a,b)=>isBest?b.wins-a.wins:a.wins-b.wins);
                const selected = []; const tUsed = new Set();
                for(let f of sorted) { if(!tUsed.has(f.teamId)){selected.push(f.id); tUsed.add(f.teamId);} if(selected.length>=4) break; }
                arena = selected;
            } else {
                const tids = [...new Set(alive.map(f => f.teamId))].sort(() => Math.random() - 0.5).slice(0, 4);
                arena = tids.map(tid => {
                    const pool = alive.filter(f => f.teamId === tid);
                    return pool[Math.floor(Math.random()*pool.length)].id;
                });
            }
            localVoted = false;
            await updateDoc(getRoomDoc(roomCode), { status: 'voting', arena, votes: {}, timerEnd: Date.now() + 15000 });
        }

        function renderArena(ids, votes, fighters, teams, round, total) {
            const container = document.getElementById('matchDisplay');
            const votted = Object.keys(votes || {}).length;
            const revealed = votted >= total;

            const isSpecial = round % 20 === 0;
            const msg = document.getElementById('special-challenge-msg');
            if(isSpecial) {
                msg.innerText = (round/20)%2!==0 ? "🔥 ELITE CLASH 🔥" : "💀 SURVIVAL CLASH 💀";
                msg.classList.remove('hidden');
            } else { msg.classList.add('hidden'); }

            container.innerHTML = ids.map(id => {
                const f = fighters.find(x => x.id === id);
                const t = teams.find(x => x.id === f.teamId);
                const count = Object.values(votes || {}).filter(v => v.id === id).reduce((a, b) => a + b.w, 0);
                return `
                    <div onclick="castVote(${id})" class="fighter-card cursor-pointer glass p-8 rounded-[3.5rem] w-64 flex flex-col items-center border-4" style="border-color:${t.color}40">
                        <div class="relative mb-6">
                            <img src="${f.i}" class="w-44 h-44 rounded-[2.5rem] object-cover shadow-2xl border-4" style="border-color:${t.color}">
                            <div class="win-badge">${f.wins || 0}</div>
                        </div>
                        <h3 class="font-black text-2xl uppercase tracking-tighter mb-1">${f.n}</h3>
                        <span class="text-[10px] font-black uppercase px-4 py-1 rounded-full" style="background:${t.color}20; color:${t.color}">${t.name}</span>
                        <div class="mt-8 text-5xl font-black italic transition-all ${revealed ? 'vote-visible' : 'vote-hidden'}">${count}</div>
                    </div>
                `;
            }).join('');
        }

        window.castVote = async (id) => {
            if(localVoted || roomData.status !== 'voting') return;
            const w = (isDoubleActive && myDoubleVotes > 0) ? 2 : 1;
            localVoted = true;
            if(isDoubleActive) { myDoubleVotes--; isDoubleActive = false; }
            
            const aliveF = roomData.allFighters.find(f => f.id === id);
            if(aliveF && aliveF.teamId === myBetTeamId) {
                // Se voti il tuo team guadagni meno o perdi punti? 
                // In questo gioco voti chi vuoi eliminare.
            }

            await updateDoc(getRoomDoc(roomCode), { [`votes.${currentUser.uid}`]: { id, w } });
            showToast("VOTO INVIATO");
            
            // Logica Power-up (guadagni quando i tuoi membri sopravvivono ai round)
            if(roomData.arena.every(aid => {
                const fighter = roomData.allFighters.find(x => x.id === aid);
                return fighter.teamId === myBetTeamId ? aid !== id : true;
            })) {
                // Se non hai votato il tuo team, e il tuo team è in arena...
            }
        };

        function renderSuspense(arena, votes, fighters) {
            let counts = {}; arena.forEach(id => counts[id] = 0);
            if(votes) Object.values(votes).forEach(v => { if(counts[v.id] !== undefined) counts[v.id] += v.w; });
            document.getElementById('reveal-votes').innerHTML = arena.map(id => {
                const f = fighters.find(x => x.id === id);
                return `<div class="text-center"><img src="${f.i}" class="w-28 h-28 rounded-[2rem] border-4 border-red-600 mb-4 mx-auto object-cover"><div class="font-black text-6xl text-red-600">${counts[id]}</div></div>`;
            }).join('');
        }

        function renderFinalVictory(fighters, teams) {
            const alive = fighters.filter(f => !f.dead);
            if(alive.length === 0) return;
            const team = teams[alive[0].teamId];
            document.getElementById('winTeamName').innerText = team.name;
            document.getElementById('winTeamName').style.color = team.color;
            const members = fighters.filter(f => f.teamId === team.id).sort((a,b) => (b.wins||0)-(a.wins||0));
            document.getElementById('win-team-members').innerHTML = members.map((m, i) => `
                <div class="text-center glass p-8 rounded-[3rem] w-48 ${i===0 ? 'gold-glow scale-110' : ''}">
                    <div class="relative inline-block mb-4">
                        <img src="${m.i}" class="w-32 h-32 rounded-[2rem] object-cover border-4" style="border-color:${team.color}">
                        ${i===0 ? '<div class="absolute -top-6 -right-6 text-6xl">👑</div>' : ''}
                    </div>
                    <p class="font-black uppercase truncate text-sm">${m.n}</p>
                    <p class="text-3xl font-black text-yellow-500 mt-2">${m.wins||0} WINS</p>
                    <p class="text-[10px] font-bold text-slate-500 mt-1">${m.dead ? 'CADUTO' : 'SUPERSTITE'}</p>
                </div>
            `).join('');
        }

        function renderTopStats(fighters, teams) {
            const tStats = teams.map(t => {
                const alive = fighters.filter(f => f.teamId === t.id && !f.dead).length;
                return { ...t, alive };
            }).sort((a,b) => b.alive - a.alive).slice(0, 5);
            document.getElementById('top-teams-list').innerHTML = tStats.map(t => `
                <div class="flex items-center gap-2 bg-slate-900 px-3 py-1 rounded-full border border-white/5">
                    <div class="w-2 h-2 rounded-full" style="background:${t.color}"></div>
                    <span class="text-[10px] font-black uppercase">${t.name}</span>
                    <span class="text-[10px] font-black text-blue-400">${t.alive}</span>
                </div>
            `).join('');

            const topF = [...fighters].sort((a,b) => (b.wins||0)-(a.wins||0)).slice(0, 10);
            document.getElementById('top-fighters-list').innerHTML = topF.map(f => `
                <div class="relative w-10 h-10 shrink-0 ${f.dead ? 'grayscale opacity-20' : ''}">
                    <img src="${f.i}" class="w-full h-full rounded-lg object-cover border" style="border-color:${teams[f.teamId].color}">
                </div>
            `).join('');
        }

        function renderTeamsPanel(teams, fighters, arena) {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = teams.map(t => {
                const members = fighters.filter(f => f.teamId === t.id);
                const alive = members.filter(f => !f.dead).length;
                const isMy = t.id === myBetTeamId;
                
                // Logica powerup semplice: ogni round che il tuo team sopravvive
                if(isMy && roomData?.status === 'suspense') {
                   const inArena = arena?.some(id => members.find(m => m.id === id));
                   const survived = arena?.every(id => {
                       const f = fighters.find(x => x.id === id);
                       return f.teamId === t.id ? !f.dead : true;
                   });
                   if(inArena && survived) { /* bonus logic could go here */ }
                }

                return `
                <div class="min-w-[220px] glass p-4 rounded-[2rem] flex flex-col justify-between ${isMy ? 'ring-2 ring-blue-500 bg-blue-900/10' : ''} ${alive===0 ? 'opacity-20' : ''}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-[10px] uppercase" style="color:${t.color}">${t.name}</span>
                        <span class="text-[10px] font-black bg-white/5 px-2 py-0.5 rounded-md">${alive}/10</span>
                    </div>
                    <div class="grid grid-cols-5 gap-1.5">
                        ${members.map(m => `
                            <img src="${m.i}" class="w-8 h-8 rounded-md object-cover ${m.dead ? 'opacity-10 grayscale' : ''} ${arena?.includes(m.id) ? 'ring-2 ring-white animate-pulse' : ''}">
                        `).join('')}
                    </div>
                    ${isMy ? `
                    <div class="mt-3">
                        <button onclick="toggleDoubleVote()" class="w-full py-1.5 rounded-xl text-[9px] font-black uppercase transition-all ${myDoubleVotes > 0 ? (isDoubleActive ? 'active-double' : 'bg-yellow-600') : 'bg-slate-800 text-slate-600 cursor-not-allowed'}">⚡ X2 VOTE (${myDoubleVotes})</button>
                    </div>` : ''}
                </div>`;
            }).join('');
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        window.startBettingPhase = async () => { if(isHost) await updateDoc(getRoomDoc(roomCode), { status: 'betting', timerEnd: Date.now() + 30000 }); };
        window.toggleDoubleVote = () => { if(myDoubleVotes > 0) { isDoubleActive = !isDoubleActive; renderTeamsPanel(roomData.teams, roomData.allFighters, roomData.arena); } };
    </script>
</body>
</html>
